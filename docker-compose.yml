version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: logs_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-logs_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lms_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lms_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-logs_db}
      SECRET_KEY: ${SECRET_KEY:-your-super-secret-key-change-this}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      SYSLOG_HOST: 0.0.0.0
      SYSLOG_PORT: 514
      LOG_RETENTION_DAYS: ${LOG_RETENTION_DAYS:-7}
      DEBUG: ${DEBUG:-False}
    ports:
      - "8000:8000"
      - "514:514/udp"
    volumes:
      - ./backend:/app
    networks:
      - lms_network
    command: >
      sh -c "alembic upgrade head &&
             python -m app.init_data &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lms_frontend
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000}
      REACT_APP_API_TIMEOUT: ${REACT_APP_API_TIMEOUT:-30000}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - lms_network

volumes:
  postgres_data:

networks:
  lms_network:
    driver: bridge
